name: CI

on:
  push:
    branches: [ main, phase-* ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: ${{ matrix.os }} / ${{ matrix.compiler }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            compiler: gcc
            triplet: x64-linux
          - os: ubuntu-24.04
            compiler: clang
            triplet: x64-linux
          - os: macos-14
            compiler: clang
            triplet: arm64-osx
          - os: windows-2022
            compiler: msvc
            triplet: x64-windows

    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        submodules: recursive

    - name: Checkout common_system
      uses: actions/checkout@v6
      with:
        repository: kcenon/common_system
        path: common_system
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Install dependencies (Ubuntu)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        # Ubuntu 24.04 has GCC 14 by default with C++20 <format> support
        sudo apt-get install -y cmake ninja-build clang

    - name: Install dependencies (macOS)
      if: runner.os == 'macOS'
      run: |
        brew install ninja

    - name: Set up compiler (GCC)
      if: matrix.compiler == 'gcc'
      run: |
        # Ubuntu 24.04 uses GCC 14 by default
        echo "CC=gcc" >> $GITHUB_ENV
        echo "CXX=g++" >> $GITHUB_ENV

    - name: Set up compiler (Clang - Linux)
      if: matrix.compiler == 'clang' && runner.os == 'Linux'
      run: |
        # Ubuntu 24.04 uses GCC 14 libstdc++ by default (C++20 <format> support)
        echo "CC=clang" >> $GITHUB_ENV
        echo "CXX=clang++" >> $GITHUB_ENV

    - name: Set up compiler (Clang - macOS)
      if: matrix.compiler == 'clang' && runner.os == 'macOS'
      run: |
        echo "CC=clang" >> $GITHUB_ENV
        echo "CXX=clang++" >> $GITHUB_ENV

    - name: Set up compiler (MSVC)
      if: matrix.compiler == 'msvc'
      uses: ilammy/msvc-dev-cmd@v1

    - name: Check architecture (Linux)
      if: runner.os == 'Linux'
      run: |
        if [ "$(uname -m)" = "aarch64" ]; then
          echo "VCPKG_FORCE_SYSTEM_BINARIES=arm" >> $GITHUB_ENV
        fi

    - name: Setup vcpkg
      uses: kcenon/common_system/.github/actions/setup-vcpkg@main
      with:
        extra-cache-key: 'container-system'

    - name: Cache vcpkg installed
      uses: actions/cache@v5
      id: vcpkg-installed
      with:
        path: ${{ github.workspace }}/vcpkg_installed
        key: ${{ runner.os }}-${{ matrix.compiler }}-vcpkg-installed-${{ matrix.triplet }}-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}
        restore-keys: |
          ${{ runner.os }}-${{ matrix.compiler }}-vcpkg-installed-${{ matrix.triplet }}-

    - name: Install dependencies with vcpkg (Unix)
      if: runner.os != 'Windows' && steps.vcpkg-installed.outputs.cache-hit != 'true'
      run: |
        ${{ env.VCPKG_ROOT }}/vcpkg install --x-manifest-root=. --x-install-root=${{ github.workspace }}/vcpkg_installed --triplet ${{ matrix.triplet }}

    - name: Install dependencies with vcpkg (Windows)
      if: runner.os == 'Windows' && steps.vcpkg-installed.outputs.cache-hit != 'true'
      shell: pwsh
      run: |
        ${{ env.VCPKG_ROOT }}\vcpkg install --x-manifest-root=. --x-install-root=${{ github.workspace }}\vcpkg_installed --triplet ${{ matrix.triplet }}

    - name: Build application (vcpkg - Unix)
      if: runner.os != 'Windows'
      id: build_vcpkg_unix
      continue-on-error: true
      run: |
        CMAKE_FLAGS=(
          -DCMAKE_BUILD_TYPE=Debug
          -DBUILD_WITH_COMMON_SYSTEM=ON
          -DBUILD_TESTS=ON
          -DBUILD_CONTAINER_SAMPLES=ON
          -DBUILD_CONTAINER_EXAMPLES=ON
          -DCMAKE_TOOLCHAIN_FILE="${{ env.CMAKE_TOOLCHAIN_FILE }}"
        )

        if [ -n "$CXXFLAGS" ]; then
          CMAKE_FLAGS+=(-DCMAKE_CXX_FLAGS="$CXXFLAGS")
        fi
        if [ -n "$CFLAGS" ]; then
          CMAKE_FLAGS+=(-DCMAKE_C_FLAGS="$CFLAGS")
        fi

        cmake -B build -G Ninja "${CMAKE_FLAGS[@]}"
        cmake --build build --config Debug --parallel

    - name: Build application (vcpkg - Windows)
      if: runner.os == 'Windows'
      id: build_vcpkg_windows
      continue-on-error: true
      run: |
        cmake -B build -G Ninja `
          -DCMAKE_BUILD_TYPE=Debug `
          -DBUILD_WITH_COMMON_SYSTEM=ON `
          -DBUILD_TESTS=ON `
          -DBUILD_CONTAINER_SAMPLES=ON `
          -DBUILD_CONTAINER_EXAMPLES=ON `
          -DCMAKE_TOOLCHAIN_FILE="${{ env.CMAKE_TOOLCHAIN_FILE }}"
        cmake --build build --config Debug --parallel

    - name: Test (vcpkg - Unix)
      if: runner.os != 'Windows' && steps.build_vcpkg_unix.outcome == 'success'
      timeout-minutes: 10
      run: |
        cd build
        for test in bin/unit_tests bin/test_messaging_integration; do
          if [ -f "$test" ]; then
            echo "Running $(basename $test)..."
            $test || echo "Test failed but continuing..."
          fi
        done

    - name: Test (vcpkg - Windows)
      if: runner.os == 'Windows' && steps.build_vcpkg_windows.outcome == 'success'
      timeout-minutes: 10
      shell: pwsh
      run: |
        cd build
        $tests = @("bin\unit_tests.exe", "bin\test_messaging_integration.exe")
        foreach ($test in $tests) {
          if (Test-Path $test) {
            Write-Host "Running $(Split-Path $test -Leaf)..."
            & $test
            if ($LASTEXITCODE -ne 0) {
              Write-Host "Test failed but continuing..."
            }
          }
        }

    - name: Build application (fallback - Unix)
      if: runner.os != 'Windows' && steps.build_vcpkg_unix.outcome != 'success'
      run: |
        echo "vcpkg build failed. Falling back to FetchContent..."
        rm -rf build
        CMAKE_FLAGS=(
          -DCMAKE_BUILD_TYPE=Debug
          -DBUILD_WITH_COMMON_SYSTEM=ON
          -DBUILD_TESTS=ON
          -DBUILD_CONTAINER_SAMPLES=ON
          -DBUILD_CONTAINER_EXAMPLES=ON
        )

        if [ -n "$CXXFLAGS" ]; then
          CMAKE_FLAGS+=(-DCMAKE_CXX_FLAGS="$CXXFLAGS")
        fi
        if [ -n "$CFLAGS" ]; then
          CMAKE_FLAGS+=(-DCMAKE_C_FLAGS="$CFLAGS")
        fi

        cmake -B build -G Ninja "${CMAKE_FLAGS[@]}"
        cmake --build build --config Debug --parallel

    - name: Build application (fallback - Windows)
      if: runner.os == 'Windows' && steps.build_vcpkg_windows.outcome != 'success'
      shell: pwsh
      run: |
        Write-Host "vcpkg build failed. Falling back to FetchContent..."
        if (Test-Path build) { Remove-Item -Recurse -Force build }
        cmake -B build -G Ninja `
          -DCMAKE_BUILD_TYPE=Debug `
          -DBUILD_WITH_COMMON_SYSTEM=ON `
          -DBUILD_TESTS=ON `
          -DBUILD_CONTAINER_SAMPLES=ON `
          -DBUILD_CONTAINER_EXAMPLES=ON
        cmake --build build --config Debug --parallel

    - name: Test (fallback - Unix)
      if: runner.os != 'Windows' && steps.build_vcpkg_unix.outcome != 'success'
      timeout-minutes: 10
      run: |
        cd build
        for test in bin/unit_tests bin/test_messaging_integration; do
          if [ -f "$test" ]; then
            echo "Running $(basename $test)..."
            $test || echo "Test failed but continuing..."
          fi
        done

    - name: Test (fallback - Windows)
      if: runner.os == 'Windows' && steps.build_vcpkg_windows.outcome != 'success'
      timeout-minutes: 10
      shell: pwsh
      run: |
        cd build
        $tests = @("bin\unit_tests.exe", "bin\test_messaging_integration.exe")
        foreach ($test in $tests) {
          if (Test-Path $test) {
            Write-Host "Running $(Split-Path $test -Leaf)..."
            & $test
            if ($LASTEXITCODE -ne 0) {
              Write-Host "Test failed but continuing..."
            }
          }
        }

    - name: Upload build artifacts
      if: failure()
      uses: actions/upload-artifact@v7
      with:
        name: build-${{ matrix.os }}-${{ matrix.compiler }}-logs
        path: |
          build/CMakeFiles/*.log
          build/Testing/Temporary/

  sanitizers:
    name: Sanitizers (${{ matrix.sanitizer.name }})
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        sanitizer:
          - name: ThreadSanitizer
            flags: "-fsanitize=thread -g -O1"
            env: "TSAN_OPTIONS=second_deadlock_stack=1"
          - name: AddressSanitizer
            flags: "-fsanitize=address -fno-omit-frame-pointer -g -O1"
            env: "ASAN_OPTIONS=detect_leaks=1:strict_string_checks=1:detect_stack_use_after_return=1:check_initialization_order=1:strict_init_order=1"
          - name: UndefinedBehaviorSanitizer
            flags: "-fsanitize=undefined -fno-omit-frame-pointer -g -O1"
            env: "UBSAN_OPTIONS=print_stacktrace=1:halt_on_error=0"

    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        submodules: recursive

    - name: Checkout common_system
      uses: actions/checkout@v6
      with:
        repository: kcenon/common_system
        path: common_system
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Install dependencies
      run: |
        sudo apt-get update
        # Ubuntu 24.04 has GCC 14 by default with C++20 <format> support
        sudo apt-get install -y cmake ninja-build clang libgtest-dev libgmock-dev

    - name: Configure CMake with ${{ matrix.sanitizer.name }}
      run: |
        cmake -B build -G Ninja \
          -DCMAKE_BUILD_TYPE=Debug \
          -DBUILD_WITH_COMMON_SYSTEM=ON \
          -DBUILD_TESTS=ON \
          -DBUILD_CONTAINER_SAMPLES=ON \
          -DBUILD_CONTAINER_EXAMPLES=ON \
          -DCMAKE_C_COMPILER=clang \
          -DCMAKE_CXX_COMPILER=clang++ \
          -DCMAKE_C_FLAGS="${{ matrix.sanitizer.flags }}" \
          -DCMAKE_CXX_FLAGS="${{ matrix.sanitizer.flags }}" \
          -DCMAKE_EXE_LINKER_FLAGS="${{ matrix.sanitizer.flags }}" \
          -DCMAKE_SHARED_LINKER_FLAGS="${{ matrix.sanitizer.flags }}"

    - name: Build with ${{ matrix.sanitizer.name }}
      run: cmake --build build --config Debug --parallel

    - name: Run tests with ${{ matrix.sanitizer.name }}
      timeout-minutes: 10
      run: |
        cd build
        export ${{ matrix.sanitizer.env }}
        # Run core tests only - following monitoring_system pattern
        # Sanitizers add overhead, but direct execution is simpler
        for test in bin/unit_tests bin/test_messaging_integration; do
          if [ -f "$test" ]; then
            echo "Running $(basename $test) with ${{ matrix.sanitizer.name }}..."
            ./$test
          fi
        done

    - name: Upload sanitizer logs
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: sanitizer-${{ matrix.sanitizer.name }}-logs
        path: |
          build/Testing/
          build/**/*.log
        retention-days: 7
